services:
  - type: web
    name: healthcare-rag-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATA_DIR
        value: data
      - key: TOP_K
        value: "5"
      - key: SIMILARITY_THRESHOLD
        value: "0.7"
      - key: CHUNK_SIZE
        value: "500"
      - key: CHUNK_OVERLAP
        value: "100"
